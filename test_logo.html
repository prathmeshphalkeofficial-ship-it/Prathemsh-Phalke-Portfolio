<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Test</title>
    <style>
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .logo-container {
            padding: 20px;
            background: white; /* To see if it has a white background */
            border: 2px solid red;
        }
        .logo-container img {
            width: 200px;
        }
        .transparent-bg {
            background: #linear-gradient(45deg, #ccc 25%, transparent 25%), 
                        linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #ccc 75%), 
                        linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #eee;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="public/images/pp_logo.png" alt="PP Logo">
        <p style="color: black;">Original on White</p>
    </div>
    <div class="logo-container transparent-bg">
        <img src="public/images/pp_logo.png" alt="PP Logo">
        <p style="color: black;">Original on Checkerboard</p>
    </div>
</body>
</html>
